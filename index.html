<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #f5f0e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .calendar {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 24px;
      width: 100%;
      max-width: 400px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .nav-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #c45c3e;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .nav-btn:hover {
      background: rgba(196, 92, 62, 0.1);
    }

    .month-year {
      font-size: 1.5rem;
      font-weight: 600;
      color: #2d2d2d;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 8px;
    }

    .weekday {
      text-align: center;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #888;
      padding: 8px 0;
      font-weight: 500;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #2d2d2d;
      transition: all 0.2s;
      position: relative;
      background: #fafafa;
    }

    .day:hover {
      background: #f0e6df;
    }

    .day.today {
      background: #f8d4c8;
      font-weight: 600;
    }

    .day.other-month {
      color: #ccc;
    }

    .day .event-dot {
      width: 5px;
      height: 5px;
      background: #7a9e7e;
      border-radius: 50%;
      position: absolute;
      bottom: 6px;
    }

    .day.has-events .event-dot {
      display: block;
    }

    .day:not(.has-events) .event-dot {
      display: none;
    }

    .event-list {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      padding: 20px;
      min-width: 280px;
      max-width: 90vw;
      z-index: 100;
    }

    .event-list h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #2d2d2d;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }

    .event-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f5;
    }

    .event-item:last-child {
      border-bottom: none;
    }

    .event-item span {
      font-size: 0.9rem;
      color: #2d2d2d;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #c45c3e;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .delete-btn:hover {
      background: rgba(196, 92, 62, 0.1);
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 99;
    }

    .close-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: #f5f0e8;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      color: #666;
    }

    .close-btn:hover {
      background: #ebe5db;
    }

    .no-events {
      color: #999;
      font-size: 0.9rem;
      text-align: center;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <div class="calendar">
    <div class="header">
      <button class="nav-btn" id="prevBtn">&#9664;</button>
      <span class="month-year" id="monthYear"></span>
      <button class="nav-btn" id="nextBtn">&#9654;</button>
    </div>
    <div class="weekdays">
      <div class="weekday">Sun</div>
      <div class="weekday">Mon</div>
      <div class="weekday">Tue</div>
      <div class="weekday">Wed</div>
      <div class="weekday">Thu</div>
      <div class="weekday">Fri</div>
      <div class="weekday">Sat</div>
    </div>
    <div class="days" id="daysGrid"></div>
  </div>

  <div class="overlay" id="overlay" style="display: none;"></div>
  <div class="event-list" id="eventList" style="display: none;"></div>

  <script>
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];

    let currentDate = new Date();
    let events = JSON.parse(localStorage.getItem('calendarEvents') || '{}');

    function saveEvents() {
      localStorage.setItem('calendarEvents', JSON.stringify(events));
    }

    function getEvents(dateStr) {
      return events[dateStr] || [];
    }

    function addEvent(dateStr, title) {
      if (!events[dateStr]) events[dateStr] = [];
      events[dateStr].push(title);
      saveEvents();
      render();
    }

    function deleteEvent(dateStr, index) {
      events[dateStr].splice(index, 1);
      if (events[dateStr].length === 0) delete events[dateStr];
      saveEvents();
      showEventList(dateStr);
      render();
    }

    function showEventList(dateStr) {
      const dayEvents = getEvents(dateStr);
      const eventList = document.getElementById('eventList');
      const overlay = document.getElementById('overlay');

      if (dayEvents.length === 0) {
        eventList.style.display = 'none';
        overlay.style.display = 'none';
        return;
      }

      let html = `<h3>${dateStr}</h3>`;
      dayEvents.forEach((event, i) => {
        html += `<div class="event-item">
          <span>${event}</span>
          <button class="delete-btn" onclick="deleteEvent('${dateStr}', ${i})">&#10005;</button>
        </div>`;
      });
      html += '<button class="close-btn" onclick="closeEventList()">Close</button>';

      eventList.innerHTML = html;
      eventList.style.display = 'block';
      overlay.style.display = 'block';
    }

    function closeEventList() {
      document.getElementById('eventList').style.display = 'none';
      document.getElementById('overlay').style.display = 'none';
    }

    document.getElementById('overlay').addEventListener('click', closeEventList);

    function render() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();

      let html = '';

      // Previous month days
      for (let i = firstDay - 1; i >= 0; i--) {
        html += `<div class="day other-month">${daysInPrevMonth - i}</div>`;
      }

      // Current month days
      const today = new Date();
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
        const hasEvents = getEvents(dateStr).length > 0;

        let classes = 'day';
        if (isToday) classes += ' today';
        if (hasEvents) classes += ' has-events';

        html += `<div class="${classes}" onclick="handleDayClick('${dateStr}')">
          ${d}
          <span class="event-dot"></span>
        </div>`;
      }

      // Next month days
      const totalCells = firstDay + daysInMonth;
      const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (let i = 1; i <= remaining; i++) {
        html += `<div class="day other-month">${i}</div>`;
      }

      document.getElementById('daysGrid').innerHTML = html;
    }

    function handleDayClick(dateStr) {
      const dayEvents = getEvents(dateStr);
      if (dayEvents.length > 0) {
        showEventList(dateStr);
      } else {
        const title = prompt('Event title:');
        if (title && title.trim()) {
          addEvent(dateStr, title.trim());
        }
      }
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      render();
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      render();
    });

    render();
  </script>
</body>
</html>
